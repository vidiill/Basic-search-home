<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Search Home</title>
    <style>
        body {
            background-color: #000000; /* Глибокий чорний для планшета */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
            margin: 0;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .search-wrapper {
            width: 100%;
            max-width: 750px;
            min-height: 120px;
            margin-bottom: 60px;
        }
        .news-header {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 15px;
            text-align: left;
            width: 100%;
            max-width: 800px;
        }
        .news-container {
            width: 100%;
            max-width: 800px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        /* Стилізація пошукового рядка Google */
        .gcse-search {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>basic search home</h1>

    <div class="search-wrapper">
        <!-- ВАШ ОФІЦІЙНИЙ КОД GOOGLE SEARCH -->
        <script async src="https://cse.google.com/cse.js?cx=64af209a056924ff7"></script>
        <div class="gcse-search"></div>
    </div>

    <div class="news-container">
        <p class="news-header">by the way, here are some news:</p>
        
        <!-- Вбудовані новини (Google News/Bing News стиль) -->
        <iframe 
            src="https://mikle.com" 
            style="width:100%; height:600px; border:none; border-radius: 12px; filter: invert(90%) hue-rotate(180deg);">
        </iframe>
    </div>

</body>
</html>
